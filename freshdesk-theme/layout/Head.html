<!-- Title for the page -->
<title> {{ meta.title }} : {{ portal.name }} </title>

<!-- Meta information -->
{{ meta | default_meta }}

<!-- Responsive setting -->
{{ portal | default_responsive_settings }}

<!-- Search filter pills (All / Articles): Freshdesk class names vary; force white text on primary-filled controls -->
<script>
(function () {
  function isPrimaryPurpleFill(el) {
    var bg = getComputedStyle(el).backgroundColor;
    if (!bg || bg === 'transparent') return false;
    var m = bg.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)(?:,\s*([\d.]+))?\)/);
    if (!m) return false;
    if (m[4] !== undefined && parseFloat(m[4], 10) < 0.45) return false;
    var r = +m[1], g = +m[2], b = +m[3];
    return r >= 85 && r <= 120 && g >= 88 && g <= 125 && b >= 215;
  }
  function resetChipTextOverrides() {
    document.querySelectorAll('[data-bi-search-chip-text]').forEach(function (el) {
      el.removeAttribute('data-bi-search-chip-text');
      el.style.removeProperty('color');
    });
  }
  function paintSearchChipText() {
    resetChipTextOverrides();
    var sel = 'button, [role="button"], a[href], span[role="button"]';
    document.querySelectorAll(sel).forEach(function (el) {
      if (!isPrimaryPurpleFill(el)) return;
      el.setAttribute('data-bi-search-chip-text', '1');
      el.style.setProperty('color', '#ffffff', 'important');
      el.querySelectorAll('*').forEach(function (child) {
        child.setAttribute('data-bi-search-chip-text', '1');
        child.style.setProperty('color', '#ffffff', 'important');
      });
    });
  }
  function boot() {
    paintSearchChipText();
    if (!document.body) return;
    var t;
    var obs = new MutationObserver(function () {
      clearTimeout(t);
      t = setTimeout(paintSearchChipText, 0);
    });
    obs.observe(document.body, { subtree: true, childList: true, attributes: true, attributeFilter: ['class', 'style', 'aria-pressed', 'aria-selected', 'data-state'] });
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
  else boot();
})();
</script>
